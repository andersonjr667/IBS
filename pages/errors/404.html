<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - Igreja Batista Solidária</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header"></header>

    <!-- 404 Content -->
    <section class="error-page">
        <div class="container">
            <div class="error-content">
                <div class="error-icon">
                    <i class="fas fa-circle-question"></i>
                </div>
                <h1 class="error-code">404</h1>
                <h2>Página Não Encontrada</h2>
                <p>Desculpe, a página que você procura não existe ou foi removida.</p>
                
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-home"></i> Voltar ao Início
                    </a>
                    <a href="/#contato" class="btn btn-secondary">
                        <i class="fas fa-envelope"></i> Contato
                    </a>
                </div>

                <div class="suggestions">
                    <h3>Você procurava por:</h3>
                    <ul>
                        <li><a href="/sobre">Sobre Nós</a></li>
                        <li><a href="/programacoes">Programações</a></li>
                        <li><a href="/ministerios">Ministérios</a></li>
                        <li><a href="/doacoes">Contribuições</a></li>
                        <li><a href="/mensagens">Mensagens</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" id="footer"></footer>

    <script src="../../js/script.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        // Carregar header e footer
        carregarHeader();
        carregarFooter();
    </script>
</body>
</html>
