<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado - Igreja Batista Solidária</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="error-theme">
    <!-- Header -->
    <header class="header" id="header"></header>

    <!-- 403 Content -->
    <section class="error-page">
        <div class="container">
            <div class="error-content">
                <div class="error-icon error-warning">
                    <i class="fas fa-lock"></i>
                </div>
                <h1 class="error-code">403</h1>
                <h2>Acesso Negado</h2>
                <p>Desculpe, você não tem permissão para acessar esta página.</p>
                <p class="error-details">Se acredita que isso é um erro, entre em contato conosco.</p>
                
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-home"></i> Voltar ao Início
                    </a>
                    <a href="/#contato" class="btn btn-secondary">
                        <i class="fas fa-envelope"></i> Entre em Contato
                    </a>
                </div>

                <div class="login-suggestion">
                    <p>Precisa fazer login?</p>
                    <button onclick="mostrarLoginModal()" class="link-button">
                        <i class="fas fa-sign-in-alt"></i> Fazer Login
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" id="footer"></footer>

    <script src="../../js/script.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        carregarHeader();
        carregarFooter();
    </script>
</body>
</html>
